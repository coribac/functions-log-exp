                    title: "دورة 2019 - التمرين 53",
                    content: String.raw`
                        <div class="mb-6"><span class="font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded">الجزء الأول (I):</span></div>
                        <p>الدالة العددية \(f_k\) المعرفة على \(\mathbb{R}\) كمايلي: \(f_k(x) = (x+1)^2 e^{-kx}\) حيث \(k\) وسيط حقيقي.</p>
                        <p>ليكن \((C_k)\) تمثيلها البياني للدالة \(f_k\) في المعلم المتعامد والمتجانس \((O; \vec{i}, \vec{j})\).</p>
                        <ol class="list-decimal list-inside space-y-4 mb-8">
                            <li>بين أن جميع المنحنيات \((C_k)\) تمر من نقطتين ثابتتين يطلب تعيينهما.</li>
                            <li>أحسب نهايتي الدالة \(f_k\) عند \(-\infty\) و \(+\infty\) (ناقش حسب قيم الوسيط الحقيقي \(k\)).</li>
                            <li>أ) احسب \(f'_k(x)\) وحدد حسب قيم الوسيط الحقيقي \(k\) اتجاه تغير الدالة \(f_k\).<br>ب) شكل جدول تغيرات الدالة \(f_k\) من أجل \(k\) عدد حقيقي موجب تماما.</li>
                            <li>ناقش وحسب قيم الوسيط الحقيقي \(k\) الأوضاع النسبية لـ \((C_k)\) و \((C_{k+1})\).</li>
                        </ol>
                        <div class="mb-6"><span class="font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded">الجزء الثاني (II):</span></div>
                        <p>\(f\) الدالة العددية المعرفة على \(\mathbb{R}\) بـ: \(f(x) = (x+1)^2 e^{-2x}\)<br>و \((C_f)\) تمثيلها البياني في المستوي المنسوب إلى معلم متعامد ومتجانس.</p>
                        <ol class="list-decimal list-inside space-y-4">
                            <li>شكل جدول تغيرات الدالة \(f\) ، ثم أرسم المنحنى \((C_f)\) على المجال \([-\frac{3}{2}, +\infty[\).</li>
                            <li>أ) بين ان المعادلة \(f(x) = 1\) تقبل حلين أحدهما \(\alpha\) حيث : \(-1.28 < \alpha < -1.27\).<br>ب) عين قيم العدد الحقيقي \(m\) التي من أجلها تقبل المعادلة : \(\left| \frac{x+1}{e^x} \right| = \left| \frac{m+1}{e^m} \right|\) حلا وحيدا.</li>
                        </ol>
                    `
                },
                {
                    id: "2018_math",
                    title: "دورة 2018 - التمرين 54",
                    content: String.raw`
                        <div class="mb-6"><span class="font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded">الجزء الأول (I):</span></div>
                        <p>الدالة العددية \(g\) المعرفة على المجال \(]0, +\infty[\) بـ: \(g(x) = (1+x+x^2)e^{\frac{1}{x}} - 1\)</p>
                        <ol class="list-decimal list-inside space-y-4 mb-8">
                            <li>بين أنه من أجل كل \(x\) من المجال \(]0, +\infty[\): \(g'(x) = \frac{(x+1)(2x^2+1)}{x^2}e^{\frac{1}{x}}\) وأستنتج اتجاه تغير الدالة \(g\).</li>
                            <li>بين أن المعادلة \(g(x) = 0\) تقبل حلا وحيدا \(\alpha\) حيث \(0.9 < \alpha < 1\). واستنتج إشارة \(g(x)\) على المجال \(]0, +\infty[\).</li>
                        </ol>
                        <div class="mb-6"><span class="font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded">الجزء الثاني (II):</span></div>
                        <p>\(f\) الدالة العددية المعرفة على \(]0, +\infty[\) كما يلي: \(f(x) = \frac{1}{x} + (1+x)e^{\frac{1}{x}}\) و \((C_f)\) تمثيلها البياني.</p>
                        <ol class="list-decimal list-inside space-y-4">
                            <li>أ) أحسب \(\lim_{x \to 0^+} f(x)\) و \(\lim_{x \to +\infty} f(x)\).<br>ب) بين أنه من أجل كل عدد حقيقي \(x\) من المجال \(]0, +\infty[\): \(f'(x) = \frac{-g(x)}{x^2}\) واستنتج اتجاه تغير الدالة \(f\) ثم شكل جدول تغيراتها.</li>
                            <li>بين أن \(\lim_{x \to +\infty} (xe^{\frac{1}{x}} - x) = 1\) (يمكن وضع \(t = \frac{1}{x}\)) ثم استنتج ان المستقيم \((\Delta)\) ذو المعادلة \(y = x + 2\) مقارب للمنحنى \((C_f)\) بجوار \(+\infty\).</li>
                            <li>\(h\) الدالة العددية والمعرفة على المجال \(]0, +\infty[\) كما يلي: \(h(x) = \frac{1}{x} - 1 + e^{\frac{1}{x}}\)<br>أ) أحسب \(\lim_{x \to +\infty} h(x)\) وادرس اتجاه تغير الدالة \(h\) واستنتج إشارة \(h(x)\) على المجال \(]0, +\infty[\).<br>ب) تحقق أن: \(f(x) - (x+2) = (1+x)h(x)\) واستنتج الوضعية النسبية لـ \((C_f)\) بالنسبة للمستقيم \((\Delta)\).</li>
                            <li>أرسم المستقيم \((\Delta)\) و المنحنى \((C_f)\) (نأخذ \(f(\alpha) \approx 4.73\)).</li>
                        </ol>
                    `

                        <div class="mb-6"><span class="font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded">الجزء الأول (I):</span></div>

        // توليد باقي السنوات برمجياً إذا لزم الأمر
        // (تم إدراج جميع السنوات المطلوبة في البيانات أعلاه)

        document.addEventListener('DOMContentLoaded', () => {
            const trackSelect = document.getElementById('track-select');
            const yearSelect = document.getElementById('year-select');
            const titleElement = document.getElementById('exercise-title');
            const contentElement = document.getElementById('exercise-content');
            const appSubtitle = document.getElementById('app-subtitle');
            const trackBadge = document.getElementById('track-badge');

            function updateYearOptions(track) {
                const trackExercises = exercisesData[track];
                yearSelect.innerHTML = '';
                
                trackExercises.forEach(exercise => {
                    const option = document.createElement('option');
                    option.value = exercise.id;
                    option.textContent = exercise.title;
                    yearSelect.appendChild(option);
                });
            }

            function displayExercise(track, exerciseId) {
                const exercise = exercisesData[track].find(ex => ex.id === exerciseId);
                if (exercise) {
                    titleElement.textContent = exercise.title;
                    contentElement.innerHTML = exercise.content;
                    
                    if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                        window.MathJax.typesetPromise([contentElement]).catch((err) => console.log(err.message));
                    }
                }
            }

            trackSelect.addEventListener('change', (e) => {
                const selectedTrack = e.target.value;
                updateYearOptions(selectedTrack);
                
                if (exercisesData[selectedTrack].length > 0) {
                    displayExercise(selectedTrack, exercisesData[selectedTrack][0].id);
                }

                if (selectedTrack === 'math') {
                    appSubtitle.textContent = 'مادة الرياضيات - شعبة الرياضيات';
                    trackBadge.textContent = 'رياضيات';
                } else if (selectedTrack === 'tech_math') {
                    appSubtitle.textContent = 'مادة الرياضيات - شعبة تقني رياضي';
                    trackBadge.textContent = 'تقني رياضي';
                } else {
                    appSubtitle.textContent = 'مادة الرياضيات - شعبة العلوم التجريبية';
                    trackBadge.textContent = 'علوم تجريبية';
                }
            });

            yearSelect.addEventListener('change', (e) => {
                displayExercise(trackSelect.value, e.target.value);
            });

            // التهيئة المبدئية عند تحميل الصفحة
            updateYearOptions(trackSelect.value);
            if (exercisesData[trackSelect.value].length > 0) {
                displayExercise(trackSelect.value, exercisesData[trackSelect.value][0].id);
            }
        });
    </script>
